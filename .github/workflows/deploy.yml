name: BrieFin Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/briefin-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon -x test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Redis 컨테이너 실행 (없을 때만)
            if ! docker ps -q --filter name=redis | grep -q .; then
              docker run -d \
                --name redis \
                --restart unless-stopped \
                -p 6379:6379 \
                redis:alpine
            fi

            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop briefin-backend || true
            docker rm   briefin-backend || true

            docker run -d \
              --name briefin-backend \
              --restart unless-stopped \
              --network host \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e KIS_APP_KEY="${{ secrets.KIS_APP_KEY }}" \
              -e KIS_APP_SECRET="${{ secrets.KIS_APP_SECRET }}" \
              -e LS_APP_KEY="${{ secrets.LS_APP_KEY }}" \
              -e LS_APP_SECRET_KEY="${{ secrets.LS_APP_SECRET_KEY }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e DART_API_KEY="${{ secrets.DART_API_KEY }}" \
              -e VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
              ${{ env.IMAGE_NAME }}:latest

            docker image prune -f